<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xtray | Admin Panel</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: monospace; background: #fff; color: #333; font-size: 14px; }

        /* AUTH */
        #auth-screen {
            position: fixed; inset: 0; background: #fff;
            display: flex; align-items: center; justify-content: center;
            z-index: 999; padding: 20px;
        }
        .auth-box {
            width: 100%; max-width: 300px; border: 1px solid #ddd;
            border-radius: 6px; padding: 24px; text-align: center;
        }
        .auth-title { font-size: 15px; font-weight: bold; color: #222; margin-bottom: 4px; }
        .auth-sub { font-size: 11px; color: #999; margin-bottom: 16px; }
        .auth-input {
            width: 100%; border: 1px solid #ccc; border-radius: 4px;
            padding: 9px 11px; font-size: 12px; font-family: monospace;
            margin-bottom: 10px; outline: none;
        }
        .auth-input:focus { border-color: #3182ce; }
        .auth-btn {
            width: 100%; background: #3182ce; color: #fff; border: none;
            border-radius: 4px; padding: 10px; font-size: 12px; font-weight: bold;
            font-family: monospace; cursor: pointer;
        }
        .auth-btn:hover { background: #2b6cb0; }
        .auth-err { font-size: 11px; color: #e53e3e; margin-top: 8px; display: none; }

        /* TOP BAR */
        .topbar {
            background: #f5f5f5; border-bottom: 1px solid #ddd;
            padding: 8px 16px; display: flex; align-items: center; justify-content: space-between;
        }
        .site-title { font-weight: bold; font-size: 15px; color: #222; }
        .site-title span { color: #e53e3e; }
        .topbar-right { display: flex; gap: 8px; }
        .tb-link {
            font-size: 11px; color: #3182ce; text-decoration: none;
            border: 1px solid #bee3f8; background: #ebf8ff;
            padding: 4px 10px; border-radius: 3px;
        }
        .tb-link.danger { color: #e53e3e; border-color: #feb2b2; background: #fff5f5; }

        /* TABS */
        .tabs {
            background: #f5f5f5; border-bottom: 1px solid #ddd;
            padding: 0 16px; display: flex; overflow-x: auto;
        }
        .tab {
            padding: 8px 14px; font-size: 12px; font-family: monospace;
            color: #666; cursor: pointer; border: none; background: none;
            border-bottom: 2px solid transparent; white-space: nowrap;
        }
        .tab.active { color: #3182ce; border-bottom-color: #3182ce; font-weight: bold; }

        /* STATS */
        .stats-row {
            background: #fffbf0; border-bottom: 1px solid #eee;
            padding: 6px 16px; font-size: 11px; color: #888;
            display: flex; gap: 16px;
        }
        .stats-row b { color: #333; }

        /* VIEWS */
        .view { display: none; max-width: 600px; margin: 0 auto; padding: 16px; }
        .view.active { display: block; }

        /* CARD */
        .card { border: 1px solid #ddd; border-radius: 6px; padding: 16px; margin-bottom: 14px; }
        .card-title {
            font-size: 12px; font-weight: bold; color: #333;
            margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.3px;
        }
        label {
            font-size: 10px; font-weight: bold; color: #999;
            text-transform: uppercase; display: block;
            margin-top: 10px; margin-bottom: 4px;
        }
        label:first-of-type { margin-top: 0; }
        input, select, textarea {
            width: 100%; border: 1px solid #ccc; border-radius: 4px;
            padding: 8px 10px; font-size: 12px; font-family: monospace; outline: none;
        }
        input:focus, select:focus, textarea:focus { border-color: #3182ce; }

        /* MAP CHIP INPUT */
        .chip-box {
            width: 100%; min-height: 42px; border: 1px solid #ccc; border-radius: 4px;
            padding: 6px 8px; display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
            cursor: text; margin-bottom: 10px; background: #fff;
        }
        .chip-box:focus-within { border-color: #3182ce; }
        .map-chip {
            display: inline-flex; align-items: center; gap: 5px;
            background: #ebf8ff; border: 1px solid #90cdf4; color: #2b6cb0;
            border-radius: 20px; padding: 3px 8px 3px 12px; font-size: 11px; font-weight: bold;
        }
        .map-chip .chip-remove {
            cursor: pointer; font-weight: bold; color: #2b6cb0; font-size: 13px;
            width: 16px; height: 16px; display: flex; align-items: center; justify-content: center;
        }
        .map-chip .chip-remove:hover { color: #e53e3e; }
        .chip-input {
            flex: 1; min-width: 120px; border: none; outline: none;
            font-size: 12px; font-family: monospace; padding: 4px 0;
        }

        /* TAG MULTI-SELECT */
        .tag-select-box {
            cursor: pointer; position: relative;
        }
        .tag-chip {
            display: inline-flex; align-items: center; gap: 5px;
            background: #faf5ff; border: 1px solid #d6bcfa; color: #6b46c1;
            border-radius: 20px; padding: 3px 8px 3px 12px; font-size: 11px; font-weight: bold;
        }
        .tag-chip .chip-remove {
            cursor: pointer; font-weight: bold; color: #6b46c1; font-size: 13px;
            width: 16px; height: 16px; display: flex; align-items: center; justify-content: center;
        }
        .tag-dropdown {
            display: none; border: 1px solid #ccc; border-radius: 6px;
            margin: -4px 0 10px; max-height: 200px; overflow-y: auto; background: #fff;
        }
        .tag-dropdown.open { display: block; }
        .tag-option {
            padding: 9px 12px; font-size: 12px; cursor: pointer; border-bottom: 1px solid #eee;
        }
        .tag-option:last-child { border-bottom: none; }
        .tag-option:hover { background: #f7f7ff; }
        .tag-option.selected { background: #ebf8ff; color: #3182ce; font-weight: bold; }
        .tag-option.selected::before { content: "✓ "; }
        textarea { resize: none; }
        .btn-primary {
            width: 100%; background: #3182ce; color: #fff; border: none;
            border-radius: 4px; padding: 10px; font-size: 12px; font-weight: bold;
            font-family: monospace; cursor: pointer; margin-top: 14px;
        }
        .btn-primary:hover { background: #2b6cb0; }
        .btn-danger {
            background: #fff5f5; border: 1px solid #feb2b2; color: #e53e3e;
            border-radius: 4px; padding: 5px 9px; font-size: 11px;
            font-family: monospace; cursor: pointer;
        }
        .btn-danger:hover { background: #fed7d7; }

        /* LIST */
        .list-item {
            border: 1px solid #eee; border-radius: 4px; padding: 9px 11px;
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 6px; gap: 8px;
        }
        .li-name { font-size: 12px; font-weight: bold; color: #222; }
        .li-sub { font-size: 10px; color: #999; margin-top: 1px; }
        .type-badge {
            font-size: 9px; font-weight: bold; padding: 1px 6px;
            border-radius: 3px; text-transform: uppercase; border: 1px solid;
        }
        .badge-script { background: #ebf8ff; color: #2b6cb0; border-color: #90cdf4; }
        .badge-executor { background: #fffaf0; color: #c05621; border-color: #fbd38d; }
        .badge-cheat { background: #f0fff4; color: #276749; border-color: #9ae6b4; }
        .badge-file { background: #faf5ff; color: #6b46c1; border-color: #d6bcfa; }
        .empty { text-align: center; padding: 28px; color: #bbb; font-size: 12px; }

        /* TOAST */
        .toast {
            position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
            background: #333; color: #fff; border-radius: 4px;
            padding: 8px 16px; font-size: 12px; z-index: 999;
            opacity: 0; transition: opacity 0.2s; white-space: nowrap;
            font-family: monospace;
        }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- AUTH -->
<div id="auth-screen">
    <div class="auth-box">
        <div class="auth-title">⚙ XTRAY ADMIN</div>
        <div class="auth-sub">Enter password to continue</div>
        <input type="password" id="auth-pass" class="auth-input" placeholder="Password..." onkeydown="if(event.key==='Enter')checkAuth()">
        <button class="auth-btn" onclick="checkAuth()">LOGIN</button>
        <div class="auth-err" id="auth-err">Wrong password!</div>
    </div>
</div>

<div id="main" style="display:none;">

<div class="topbar">
    <div class="site-title">⚙ Xtray <span>|</span> Admin</div>
    <div class="topbar-right">
        <a href="https://xtray-files.pages.dev" target="_blank" class="tb-link">👁 User View</a>
        <button class="tb-link danger" onclick="logout()">Logout</button>
    </div>
</div>

<div class="tabs">
    <button class="tab active" onclick="switchTab('upload',this)">📤 Upload</button>
    <button class="tab" onclick="switchTab('files',this)">📁 Files</button>
    <button class="tab" onclick="switchTab('stats',this)">📊 Stats</button>
</div>

<div class="stats-row">
    <span>Total: <b id="st-total">0</b></span>
    <span>Downloads: <b id="st-dl">0</b></span>
    <span>APK: <b id="st-apk">0</b></span>
</div>

<!-- UPLOAD -->
<div id="view-upload" class="view active">
    <div class="card">
        <div class="card-title" id="upload-title">📤 UPLOAD SCRIPT</div>
        <label id="name-label">Script Name</label>
        <input type="text" id="f-name" placeholder="Script name...">
        <label>File Type</label>
        <select id="f-type" onchange="onTypeChange()">
            <option value="script">📜 Script</option>
            <option value="executor">⚡ Executor</option>
            <option value="cheat">🎮 Cheat</option>
            <option value="file">📄 File / Other</option>
        </select>

        <!-- ===== SCRIPT FIELDS ===== -->
        <div id="fields-script">
            <label>Script ( Loadstring )</label>
            <textarea id="f-loadstring" rows="5" placeholder='Masukan Script...&#10;&#10;Contoh: loadstring(game:HttpGet("https://raw.githubusercontent.com/..."))()' style="font-family:monospace;font-size:11px;color:#c084fc;resize:vertical;"></textarea>

            <label>Map Support ( Roblox )</label>
            <div id="map-chip-box" class="chip-box" onclick="document.getElementById('map-input').focus()">
                <input type="text" id="map-input" class="chip-input" placeholder="Ketik nama map lalu tekan Enter..." onkeydown="handleMapInput(event)">
            </div>

            <label>Tags</label>
            <div id="tag-select-box" class="chip-box tag-select-box" onclick="toggleTagDropdown()">
                <span id="tag-select-placeholder" style="color:#aaa;font-size:12px;">Pilih tags...</span>
            </div>
            <div id="tag-dropdown" class="tag-dropdown">
                <div class="tag-option" onclick="toggleTagChoice('Key', this)">🔑 Key</div>
                <div class="tag-option" onclick="toggleTagChoice('No Key', this)">🚫 No Key</div>
                <div class="tag-option" onclick="toggleTagChoice('Best', this)">⭐ Best</div>
                <div class="tag-option" onclick="toggleTagChoice('Smooth', this)">✨ Smooth</div>
                <div class="tag-option" onclick="toggleTagChoice('Key Best', this)">🔑⭐ Key Best</div>
                <div class="tag-option" onclick="toggleTagChoice('Key Smooth', this)">🔑✨ Key Smooth</div>
                <div class="tag-option" onclick="toggleTagChoice('No Key Best', this)">🚫⭐ No Key Best</div>
                <div class="tag-option" onclick="toggleTagChoice('No Key Smooth', this)">🚫✨ No Key Smooth</div>
            </div>
        </div>

        <!-- ===== EXECUTOR FIELDS ===== -->
        <div id="fields-executor" style="display:none;">
            <label>Link Download</label>
            <input type="text" id="exec-link" placeholder="https://...">
            <label>File Size</label>
            <input type="text" id="exec-size" placeholder="Contoh: 50 MB">
            <label>Status</label>
            <select id="exec-status">
                <option value="Undetected">🟢 Undetected</option>
                <option value="Detected">🔴 Detected</option>
            </select>
            <label>Platform</label>
            <select id="exec-platform">
                <option value="Android">📱 Android</option>
                <option value="PC">💻 PC</option>
                <option value="iOS">🍎 iOS</option>
            </select>
        </div>

        <!-- ===== CHEAT FIELDS ===== -->
        <div id="fields-cheat" style="display:none;">
            <label>Download Link</label>
            <input type="text" id="cheat-link" placeholder="https://...">
            <label>Game</label>
            <div id="game-chip-box" class="chip-box" onclick="document.getElementById('game-input').focus()">
                <input type="text" id="game-input" class="chip-input" placeholder="Ketik nama game lalu tekan Enter..." onkeydown="handleGameInput(event)">
            </div>
            <label>Root / No-Root</label>
            <select id="cheat-root">
                <option value="No-Root">🚫 No-Root</option>
                <option value="Root">🔓 Root</option>
            </select>
            <label>Size</label>
            <input type="text" id="cheat-size" placeholder="e.g. 45 MB">
            <label>Platform</label>
            <select id="cheat-platform">
                <option value="Android">📱 Android</option>
                <option value="PC">💻 PC</option>
                <option value="iOS">🍎 iOS</option>
            </select>
        </div>

        <!-- ===== FILE/OTHER FIELDS ===== -->
        <div id="fields-file" style="display:none;">
            <label>Download Link</label>
            <input type="text" id="file-link" placeholder="https://...">
            <label>Size</label>
            <input type="text" id="file-size" placeholder="e.g. 12.5 MB">
        </div>

        <label>Description (optional)</label>
        <textarea id="f-desc" rows="2" placeholder="Short description..."></textarea>
        <label>Version (optional)</label>
        <input type="text" id="f-ver" placeholder="v1.0.0">
        <button class="btn-primary" onclick="addFile()">📤 UPLOAD FILE</button>
    </div>
</div>

<!-- FILES -->
<div id="view-files" class="view">
    <div class="card">
        <div class="card-title">📁 File List (<span id="file-count">0</span>)</div>
        <input type="text" id="f-search" placeholder="Search files..." oninput="renderFileList()" style="margin-bottom:10px;">
        <div id="file-list"></div>
    </div>
</div>

<!-- STATS -->
<div id="view-stats" class="view">
    <div class="card">
        <div class="card-title">📊 Download Stats</div>
        <div id="dl-list"><div class="empty">No downloads yet</div></div>
    </div>
</div>

</div>

<script>
    var PASS = 'panjijtp2';
    var db, allFiles = {};

    function checkAuth() {
        var p = document.getElementById('auth-pass').value;
        if (p === PASS || localStorage.getItem('xtray_admin') === PASS) {
            localStorage.setItem('xtray_admin', PASS);
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main').style.display = 'block';
            initFB();
        } else {
            document.getElementById('auth-err').style.display = 'block';
        }
    }

    if (localStorage.getItem('xtray_admin') === PASS) {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('main').style.display = 'block';
        document.addEventListener('DOMContentLoaded', initFB);
    }

    function logout() { localStorage.removeItem('xtray_admin'); location.reload(); }

    function initFB() {
        var cfg = { databaseURL: "https://xtray-files-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        if (!firebase.apps.length) firebase.initializeApp(cfg);
        db = firebase.database();
        db.ref('xtray_files').on('value', function(s) {
            allFiles = s.val() || {};
            var files = Object.values(allFiles);
            document.getElementById('st-total').textContent = files.length;
            document.getElementById('file-count').textContent = files.length;
            document.getElementById('st-apk').textContent = files.filter(function(f){ return f.type==='apk'; }).length;
            renderFileList();
        });
        db.ref('xtray_downloads').on('value', function(s) {
            document.getElementById('st-dl').textContent = s.numChildren();
            renderDlList(s.val());
        });
    }

    function switchTab(view, el) {
        document.querySelectorAll('.view').forEach(function(v){ v.classList.remove('active'); });
        document.getElementById('view-' + view).classList.add('active');
        document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
        if (el) el.classList.add('active');
    }

    var mapList = [];
    var tagList = [];
    var gameList = [];

    function onTypeChange() {
        var type = document.getElementById('f-type').value;
        document.getElementById('fields-script').style.display = (type === 'script') ? 'block' : 'none';
        document.getElementById('fields-executor').style.display = (type === 'executor') ? 'block' : 'none';
        document.getElementById('fields-cheat').style.display = (type === 'cheat') ? 'block' : 'none';
        document.getElementById('fields-file').style.display = (type === 'file') ? 'block' : 'none';
        var titles = { script:'📤 UPLOAD SCRIPT', executor:'📤 UPLOAD EXECUTOR', cheat:'📤 UPLOAD CHEAT', file:'📤 UPLOAD FILE' };
        document.getElementById('upload-title').textContent = titles[type];
        var nameLabels = { script:'Script Name', executor:'Executor Name', cheat:'Cheat Name', file:'File Name' };
        var namePlaceholders = { script:'Script name...', executor:'Nama Executor...', cheat:'Cheat name...', file:'File name...' };
        document.getElementById('name-label').textContent = nameLabels[type];
        document.getElementById('f-name').placeholder = namePlaceholders[type];
    }
    onTypeChange();

    function handleMapInput(e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            var val = e.target.value.trim();
            if (val && !mapList.includes(val)) { mapList.push(val); renderMapChips(); }
            e.target.value = '';
        }
    }

    function renderMapChips() {
        var box = document.getElementById('map-chip-box');
        var input = document.getElementById('map-input');
        box.querySelectorAll('.map-chip').forEach(function(c){ c.remove(); });
        mapList.forEach(function(m, i){
            var chip = document.createElement('span');
            chip.className = 'map-chip';
            chip.innerHTML = m + ' <span class="chip-remove" onclick="removeMapChip('+i+')">×</span>';
            box.insertBefore(chip, input);
        });
    }

    function removeMapChip(i) { mapList.splice(i, 1); renderMapChips(); }

    function handleGameInput(e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            var val = e.target.value.trim();
            if (val && !gameList.includes(val)) { gameList.push(val); renderGameChips(); }
            e.target.value = '';
        }
    }

    function renderGameChips() {
        var box = document.getElementById('game-chip-box');
        var input = document.getElementById('game-input');
        box.querySelectorAll('.map-chip').forEach(function(c){ c.remove(); });
        gameList.forEach(function(m, i){
            var chip = document.createElement('span');
            chip.className = 'map-chip';
            chip.innerHTML = m + ' <span class="chip-remove" onclick="removeGameChip('+i+')">×</span>';
            box.insertBefore(chip, input);
        });
    }

    function removeGameChip(i) { gameList.splice(i, 1); renderGameChips(); }

    function toggleTagDropdown() {
        document.getElementById('tag-dropdown').classList.toggle('open');
    }

    function toggleTagChoice(tag, el) {
        var idx = tagList.indexOf(tag);
        if (idx === -1) { tagList.push(tag); el.classList.add('selected'); }
        else { tagList.splice(idx, 1); el.classList.remove('selected'); }
        renderTagSelectBox();
    }

    function renderTagSelectBox() {
        var box = document.getElementById('tag-select-box');
        var ph = document.getElementById('tag-select-placeholder');
        box.querySelectorAll('.tag-chip').forEach(function(c){ c.remove(); });
        if (tagList.length === 0) {
            ph.style.display = 'inline';
        } else {
            ph.style.display = 'none';
            tagList.forEach(function(t){
                var chip = document.createElement('span');
                chip.className = 'tag-chip';
                chip.innerHTML = t + ' <span class="chip-remove" onclick="event.stopPropagation();removeTagChip(\''+t+'\')">×</span>';
                box.insertBefore(chip, ph);
            });
        }
    }

    function removeTagChip(tag) {
        var idx = tagList.indexOf(tag);
        if (idx > -1) tagList.splice(idx, 1);
        document.querySelectorAll('.tag-option').forEach(function(opt){
            if (opt.textContent.trim().includes(tag)) opt.classList.remove('selected');
        });
        renderTagSelectBox();
    }

    function addFile() {
        var name = document.getElementById('f-name').value.trim();
        var type = document.getElementById('f-type').value;
        if (!name) { showToast('⚠ Name required!'); return; }

        var data = {
            name: name, type: type,
            desc: document.getElementById('f-desc').value.trim(),
            version: document.getElementById('f-ver').value.trim(),
            timestamp: Date.now()
        };

        if (type === 'script') {
            data.loadstring = document.getElementById('f-loadstring').value.trim();
            data.maps = mapList.slice();
            data.tags = tagList.slice();
        } else if (type === 'executor') {
            data.link = document.getElementById('exec-link').value.trim();
            data.size = document.getElementById('exec-size').value.trim() || '-';
            data.status = document.getElementById('exec-status').value;
            data.platform = document.getElementById('exec-platform').value;
            if (!data.link) { showToast('⚠ Download link required!'); return; }
        } else if (type === 'cheat') {
            data.link = document.getElementById('cheat-link').value.trim();
            data.games = gameList.slice();
            data.root = document.getElementById('cheat-root').value;
            data.size = document.getElementById('cheat-size').value.trim() || '-';
            data.platform = document.getElementById('cheat-platform').value;
            if (!data.link) { showToast('⚠ Download link required!'); return; }
        } else if (type === 'file') {
            data.link = document.getElementById('file-link').value.trim();
            data.size = document.getElementById('file-size').value.trim() || '-';
            if (!data.link) { showToast('⚠ Download link required!'); return; }
        }

        db.ref('xtray_files').push(data).then(function() {
            showToast('✅ Uploaded!');
            ['f-name','f-desc','f-ver','f-loadstring','exec-link','exec-size','cheat-link','cheat-size','file-link','file-size'].forEach(function(id){
                var el = document.getElementById(id);
                if (el) el.value = '';
            });
            mapList = []; tagList = []; gameList = [];
            renderMapChips(); renderTagSelectBox(); renderGameChips();
            document.querySelectorAll('.tag-option.selected').forEach(function(o){ o.classList.remove('selected'); });
        });
    }

    function renderFileList() {
        var div = document.getElementById('file-list');
        var q = (document.getElementById('f-search').value||'').toLowerCase();
        var entries = Object.entries(allFiles).filter(function(e){
            return !q || (e[1].name||'').toLowerCase().includes(q);
        }).reverse();
        if (!entries.length) { div.innerHTML = '<div class="empty">📂 No files yet</div>'; return; }
        var icons = { script:'📜', executor:'⚡', cheat:'🎮', file:'📄' };
        div.innerHTML = entries.map(function(e) {
            var k=e[0], f=e[1];
            var subParts = [];

            if (f.type === 'script') {
                if (f.maps && f.maps.length) subParts.push('🗺 '+f.maps.join(', '));
                if (f.tags && f.tags.length) subParts.push('🏷 '+f.tags.join(', '));
            } else if (f.type === 'executor') {
                if (f.status) subParts.push(f.status === 'Undetected' ? '🟢 Undetected' : '🔴 Detected');
                if (f.size) subParts.push(f.size);
                if (f.platform) subParts.push('📱 '+f.platform);
            } else if (f.type === 'cheat') {
                if (f.games && f.games.length) subParts.push('🎮 '+f.games.join(', '));
                if (f.root) subParts.push(f.root);
                if (f.size) subParts.push(f.size);
                if (f.platform) subParts.push(f.platform);
            } else if (f.type === 'file') {
                if (f.size) subParts.push(f.size);
            }
            if (f.version) subParts.push(f.version);

            var subLine = subParts.join(' • ') || 'No details';
            return '<div class="list-item"><div style="flex:1;min-width:0;"><div class="li-name">'+(icons[f.type]||'📄')+' '+f.name+'</div><div class="li-sub">'+subLine+'</div></div><span class="type-badge badge-'+f.type+'">'+f.type.toUpperCase()+'</span><button class="btn-danger" onclick="delFile(\''+k+'\')">🗑</button></div>';
        }).join('');
    }

    function delFile(key) {
        if (!confirm('Delete this file?')) return;
        db.ref('xtray_files/'+key).remove();
        showToast('🗑 File deleted');
    }

    function renderDlList(data) {
        var div = document.getElementById('dl-list');
        if (!data) { div.innerHTML = '<div class="empty">No downloads yet</div>'; return; }
        var counts = {};
        Object.values(data).forEach(function(d){
            var name = (allFiles[d.file]||{}).name || d.file;
            counts[name] = (counts[name]||0) + 1;
        });
        var arr = Object.entries(counts).sort(function(a,b){ return b[1]-a[1]; });
        if (!arr.length) { div.innerHTML = '<div class="empty">No downloads yet</div>'; return; }
        div.innerHTML = arr.map(function(e){
            return '<div class="list-item"><div class="li-name">'+e[0]+'</div><span style="color:#3182ce;font-weight:bold;font-size:13px;">'+e[1]+'x</span></div>';
        }).join('');
    }

    function showToast(msg) {
        var t = document.getElementById('toast');
        t.textContent = msg; t.classList.add('show');
        setTimeout(function(){ t.classList.remove('show'); }, 2000);
    }
</script>
</body>
</html>
